  (function() {
    const supported = ['fr','en','he','ar','es','de','it','pt','ru','zh','ja','ko','tr','nl','pl','ro'];
    const alt = { iw:'he' };
    function detectLang() {
      const saved = localStorage.getItem('ap-lang');
      if (saved && PRIVACY_T[saved]) return saved;
      const navLangs = (navigator.languages && navigator.languages.length) ? [...navigator.languages] : [navigator.language || ''];
      for (const nl of navLangs) {
        const code = nl.toLowerCase().split('-')[0];
        if (alt[code]) return alt[code];
        if (supported.includes(code)) return code;
      }
      return 'fr';
    }
    const lang = detectLang();
    const t = PRIVACY_T[lang] || PRIVACY_T.fr;
    document.documentElement.lang = lang;
    if (['he','ar'].includes(lang)) document.documentElement.dir = 'rtl';

    // Simple text fields
    ['back','h1','date_line','s1_h','s2_h','s2_p','s3_h','s4_h','s5_h','s6_h','s7_h','s7_intro','s8_h','s8_p','s9_h','s9_p','s10_h'].forEach(k => {
      const el = document.getElementById(k);
      if (el && t[k] !== undefined) el.textContent = t[k];
    });
    // HTML fields (contain links or <strong>)
    ['s1_p','s4_p','s5_p','s6_p','s7_contact','s10_p'].forEach(k => {
      const el = document.getElementById(k);
      if (el && t[k] !== undefined) el.innerHTML = t[k];
    });
    // List fields
    [['s2_ul', t.s2_ul], ['s3_ul', t.s3_ul], ['s7_ul', t.s7_ul]].forEach(([id, items]) => {
      const el = document.getElementById(id);
      if (el && items) el.innerHTML = items.map(i => `<li>${i}</li>`).join('');
    });
  })();
